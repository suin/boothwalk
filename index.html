<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>%E2%9A%93</text></svg>" />
    <title>AppThrust 展示ブース 3Dビューア</title>
    <style>
      :root {
        color-scheme: dark;
        --panel-bg: rgba(18, 24, 34, 0.86);
        --panel-border: rgba(120, 160, 210, 0.25);
        --text: #e8eef6;
        --muted: #9fb0c4;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #05070c; }
      body { font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif; color: var(--text); }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      #ui {
        position: fixed;
        top: 16px;
        left: 16px;
        width: 260px;
        padding: 16px;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        backdrop-filter: blur(8px);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
        user-select: none;
        z-index: 10;
      }
      #ui h1 {
        margin: 0 0 4px;
        font-size: 15px;
        letter-spacing: 0.04em;
      }
      #ui .sub { margin: 0 0 14px; font-size: 12px; color: var(--muted); }
      .group { margin-bottom: 14px; }
      .group > .label {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 6px;
        letter-spacing: 0.06em;
      }
      .row { display: flex; gap: 8px; }
      button {
        flex: 1;
        padding: 9px 8px;
        font-size: 13px;
        font-family: inherit;
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.12s, border-color 0.12s;
      }
      button:hover { background: rgba(255, 255, 255, 0.12); }
      button.active {
        background: rgba(70, 150, 235, 0.28);
        border-color: rgba(120, 185, 255, 0.7);
      }
      #scheme-name { font-size: 14px; font-weight: 600; margin: 2px 0 2px; }
      #scheme-tagline { font-size: 12px; color: var(--muted); margin: 0; }
      #help {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 11px;
        line-height: 1.7;
        color: var(--muted);
      }
      #help b { color: var(--text); font-weight: 600; }

      #hint {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 5;
      }
      #hint span {
        padding: 12px 22px;
        font-size: 14px;
        background: rgba(10, 14, 20, 0.7);
        border: 1px solid var(--panel-border);
        border-radius: 999px;
        backdrop-filter: blur(6px);
      }
      #hint.hidden { display: none; }

      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 6px;
        height: 6px;
        margin: -3px 0 0 -3px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.6);
        pointer-events: none;
        z-index: 4;
        display: none;
      }
      #crosshair.on { display: block; }

      #loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(5, 7, 12, 0.92);
        z-index: 20;
        transition: opacity 0.2s ease;
      }
      #loading[hidden] { display: none; }
      #loading-card { width: min(360px, calc(100vw - 48px)); text-align: center; }
      #loading-title { margin-bottom: 12px; font-size: 14px; }
      #loading-track {
        height: 8px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
      }
      #loading-bar {
        width: 0;
        height: 100%;
        background: #4aa8ff;
        border-radius: inherit;
        transition: width 0.15s ease;
      }
      #loading-detail { margin-top: 8px; font-size: 11px; color: var(--muted); }
      #asset-status { min-height: 1.4em; margin-top: 8px; font-size: 11px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="ui">
      <h1>AppThrust 展示ブース</h1>
      <p class="sub">キービジュアル A案 / B案 の没入確認</p>

      <div class="group">
        <div class="label">キービジュアル</div>
        <div class="row">
          <button id="btn-a" data-scheme="A">A案</button>
          <button id="btn-b" data-scheme="B">B案</button>
        </div>
        <div id="scheme-name"></div>
        <p id="scheme-tagline"></p>
      </div>

      <div class="group">
        <div class="label">会場照明</div>
        <div class="row">
          <button id="btn-bright">明るい会場</button>
          <button id="btn-dark">暗い会場</button>
        </div>
      </div>

      <div class="group">
        <div class="label">視点</div>
        <div class="row">
          <button id="btn-fp">一人称</button>
          <button id="btn-orbit">俯瞰</button>
        </div>
      </div>

      <div id="help">
        <b>一人称:</b> 画面クリックで視点操作開始<br />
        <b>WASD</b> 移動 / <b>Shift</b> スニーク / <b>W×2</b> ダッシュ<br />
        マウスで視点 / <b>ESC</b> で視点操作を解除<br />
        <b>俯瞰:</b> ドラッグで回転 / ホイールで拡大
      </div>
      <div id="asset-status" aria-live="polite"></div>
    </div>

    <div id="hint" class="hidden"><span>クリックして歩き回る（ESCで解除）</span></div>
    <div id="crosshair"></div>

    <div id="loading" role="status" aria-live="polite">
      <div id="loading-card">
        <div id="loading-title">A案を読み込んでいます</div>
        <div id="loading-track"><div id="loading-bar"></div></div>
        <div id="loading-detail">0 / 0</div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
